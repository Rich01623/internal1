<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frost Transport Solutions | Portal</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { frostNight: '#020617', frostSlate: '#0f172a' } } }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Inter', sans-serif; transition: all 0.3s ease; background-color: #020617; }
        .sidebar-item { transition: all 0.2s ease; cursor: pointer; }
        .sidebar-item:hover { background-color: #1e293b; }
        .active-tab { background-color: #1e293b; border-left: 3px solid #3b82f6; }
        .hidden { display: none; }
        .dark body, .dark main { background-color: #020617 !important; }
        .frost-field { width: 100%; padding: 12px; border-radius: 6px; font-size: 14px; outline: none; background: #0f172a; color: white; border: 1px solid #334155; }
        .label-text { font-size: 10px; font-weight: 900; color: #94a3b8; text-transform: uppercase; margin-bottom: 6px; display: block; }
        .client-card { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; border-left: 4px solid #2563eb; position: relative; }
        iframe { background: #0f172a; }
    </style>
</head>
<body class="bg-slate-950 text-slate-300 flex h-screen overflow-hidden">

    <aside class="w-56 bg-[#0f172a] flex flex-col flex-shrink-0 border-r border-slate-800">
        <div class="p-4 border-b border-slate-800 flex items-center space-x-3">
            <div class="bg-blue-600 p-1.5 rounded-lg"><i class="fas fa-truck-fast text-white text-sm"></i></div>
            <div>
                <h1 class="text-white text-xs font-bold uppercase tracking-wider leading-tight">Frost Transport</h1>
                <p class="text-[10px] text-slate-500 uppercase tracking-widest italic">Operations</p>
            </div>
        </div>

        <nav class="flex-1 pt-4 overflow-y-auto">
            <a href="#" onclick="showModule('welcome')" class="sidebar-item flex items-center px-4 py-2 mb-1 text-xs active-tab">
                <i class="fas fa-desktop w-5 text-blue-400"></i><span>DASHBOARD</span>
            </a>
            
            <div class="px-4 mt-6 mb-2 text-[10px] font-black uppercase text-slate-600">Personnel</div>
            <a href="#" onclick="showModule('staff-profiles')" class="sidebar-item flex items-center px-4 py-2 text-xs"><i class="fas fa-user-tie w-5 text-amber-500"></i><span>STAFF PROFILES</span></a>
            <a href="#" onclick="resetStaffForm(); showModule('add-staff')" class="sidebar-item flex items-center px-4 py-2 text-xs"><i class="fas fa-user-plus w-5 text-blue-400"></i><span>ADD NEW STAFF</span></a>
            
            <div class="px-4 mt-6 mb-2 text-[10px] font-black uppercase text-slate-600">External Tools</div>
            <a href="https://rich01623.github.io/Planner/" target="main_frame" onclick="showModule('iframe', this.href)" class="sidebar-item flex items-center px-4 py-2 text-xs"><i class="fas fa-route w-5"></i><span>PLANNER</span></a>
            <a href="https://rich01623.github.io/Fleet-dash/" target="main_frame" onclick="showModule('iframe', this.href)" class="sidebar-item flex items-center px-4 py-2 text-xs"><i class="fas fa-id-card w-5"></i><span>TIMESHEETS</span></a>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col min-w-0">
        <header class="h-14 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-6">
            <h2 class="text-xs font-black uppercase tracking-widest text-slate-500 italic">Nottingham HQ Hub</h2>
            <div class="flex items-center space-x-4">
                <span id="live-clock" class="text-xs font-mono font-bold text-slate-400">00:00:00</span>
                <div class="h-6 w-12 bg-red-600 rounded flex items-center justify-center text-[10px] text-white font-black italic">FTS</div>
            </div>
        </header>

        <main class="flex-1 overflow-auto p-6">
            <div id="mod-welcome" class="grid grid-cols-1 lg:grid-cols-2 gap-6 h-full">
                <div class="bg-[#0f172a] rounded-lg border border-slate-800 overflow-hidden h-[550px] flex flex-col">
                    <div class="px-4 py-3 border-b border-slate-800 flex justify-between">
                        <h3 class="text-[10px] font-black uppercase italic text-blue-500">Live Weather Radar</h3>
                    </div>
                    <iframe src="https://www.rainalarm.com/sample/" class="flex-1 w-full border-none"></iframe>
                </div>
                <div class="bg-[#0f172a] rounded-lg border border-slate-800 overflow-hidden h-[550px] flex flex-col">
                    <div class="px-4 py-3 border-b border-slate-800 flex justify-between">
                        <h3 class="text-[10px] font-black uppercase italic text-red-600">Live Traffic (Nottingham)</h3>
                    </div>
                    <iframe 
                        src="https://www.bing.com/maps/embed?h=550&w=800&cp=52.9548~-1.1581&lvl=11&typ=d&sty=r&src=SHELL&FORM=MBEDV8" 
                        class="flex-1 w-full border-none"
                        scrolling="no">
                    </iframe>
                </div>
            </div>

            <iframe id="mod-iframe" name="main_frame" src="about:blank" class="hidden w-full h-full rounded border-none bg-white"></iframe>

            <div id="mod-staff-profiles" class="hidden">
                <h2 class="text-xl font-black italic uppercase text-white mb-6">Staff Profiles</h2>
                <div id="staff-container" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
            </div>

            <div id="mod-add-staff" class="hidden max-w-3xl mx-auto">
                <div class="bg-[#0f172a] rounded-lg p-8 border-t-4 border-amber-500 shadow-xl">
                    <h2 id="staff-form-title" class="text-xs font-black uppercase mb-8 text-white border-b border-slate-700 pb-2 italic tracking-widest">Register New Staff</h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="md:col-span-2"><label class="label-text">Full Name</label><input type="text" id="st-name" class="frost-field" placeholder="John Smith"></div>
                        <div><label class="label-text">Job Title</label><input type="text" id="st-job" class="frost-field" placeholder="HGV Driver"></div>
                        <div><label class="label-text">Contact Number</label><input type="text" id="st-phone" class="frost-field" placeholder="07123 456789"></div>
                    </div>
                    <button onclick="saveStaff()" class="w-full mt-10 bg-amber-500 hover:bg-amber-600 text-white font-black py-4 rounded uppercase text-xs tracking-widest transition-all">Save to Database</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://tdrzytgiqvdulityqttr.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRkcnp5dGdpcXZkdWxpdHlxdHRyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTM5NTMsImV4cCI6MjA4ODcyOTk1M30.XN46i7u6STD-2afmN7-Jh1MltADGpEuWlLt_n7wknbA';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let allStaff = [];

        window.onload = function() {
            updateTime(); setInterval(updateTime, 1000);
            showModule('welcome');
        };

        function updateTime() { document.getElementById('live-clock').innerText = new Date().toLocaleTimeString('en-GB'); }

        function showModule(modId, url = null) {
            ['mod-welcome', 'mod-iframe', 'mod-staff-profiles', 'mod-add-staff'].forEach(id => {
                document.getElementById(id).classList.add('hidden');
            });
            const activeMod = document.getElementById('mod-' + modId);
            if(activeMod) activeMod.classList.remove('hidden');
            
            if (modId === 'iframe' && url) {
                document.getElementById('mod-iframe').src = url;
            }
            if (modId === 'staff-profiles') fetchStaff();
        }

        async function fetchStaff() {
            const container = document.getElementById('staff-container');
            container.innerHTML = '<div class="col-span-full text-center text-amber-500 text-xs font-bold animate-pulse uppercase tracking-widest">Accessing Personnel Files...</div>';
            const { data, error } = await _supabase.from('staff_profiles').select('*').order('name', { ascending: true });
            if (!error) { 
                allStaff = data;
                container.innerHTML = data.map(s => `
                    <div class="client-card">
                        <h4 class="text-white font-black uppercase text-[11px] italic border-b border-slate-700 pb-2 mb-2">${s.name}</h4>
                        <div class="text-[10px] space-y-1">
                            <div class="flex justify-between"><span class="text-slate-500 font-bold">ROLE</span><span class="text-amber-500 font-black">${s.job_title || '-'}</span></div>
                            <div class="flex justify-between border-t border-slate-800 pt-1 mt-1"><span class="text-slate-500 font-bold">MOBILE</span><span class="text-blue-400 font-mono">${s.contact_number || '-'}</span></div>
                        </div>
                    </div>`).join('');
            }
        }

        async function saveStaff() {
            const payload = {
                name: document.getElementById('st-name').value,
                job_title: document.getElementById('st-job').value,
                contact_number: document.getElementById('st-phone').value
            };
            const { error } = await _supabase.from('staff_profiles').insert([payload]);
            if(error) {
                alert("Error: " + error.message);
            } else {
                alert("Record Successfully Committed");
                showModule('staff-profiles');
            }
        }

        function resetStaffForm() {
            ['st-name', 'st-job', 'st-phone'].forEach(id => document.getElementById(id).value = '');
        }
    </script>
</body>
</html>
